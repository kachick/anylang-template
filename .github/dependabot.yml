version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    cooldown:
      default-days: 7 # 7 by zizmor's default
  - package-ecosystem: 'nix'
    directory: '/'
    schedule:
      interval: 'weekly'
    versioning-strategy: 'lockfile-only'
