name: 🤖🆙❄️

permissions:
  contents: write
  pull-requests: write

on:
  pull_request:
    paths:
      - '.github/workflows/bump-flake-lock-and-selfup.yml'
  schedule:
    # Every 10:17(JST) on Monday
    # https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#schedule
    # You can see what the cron expression means at https://crontab.guru/
    - cron: '17 1 * * 1'
  workflow_dispatch:

jobs:
  bump:
    uses: kachick/selfup/.github/workflows/reusable-bump-flake-lock-and-selfup.yml@06a37ddb70ce25ec28b75ce500e15e7fb4d7c4a9 # v1.3.1
    with:
      app_id: ${{ vars.APP_ID }}
      dry-run: ${{ github.event_name == 'pull_request' }}
      pr-title: 'Bump flake.lock and related dependencies'
      optional-run: |
        echo 'Add other changes and git commit here, especially for .node-version/.ruby-version'
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
