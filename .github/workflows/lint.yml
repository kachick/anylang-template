name: 👕
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dprint:
    timeout-minutes: 15
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      # We don't cache the dprint executable here because the overhead of caching it
      # exceeds the benefit, as the check action always runs anyway.
      - uses: actions/cache@v5
        with:
          # WASM plugins only, so this cache works on any OS/arch.
          # We cache them to avoid GitHub API rate limits.
          # Revisit this cache logic once upstream supports it: https://github.com/dprint/check/issues/12
          path: ~/.cache/dprint
          key: dprint-wasm-plugins-${{ hashFiles('dprint.json', 'dprint.jsonc') }}

      - uses: dprint/check@9cb3a2b17a8e606d37aae341e49df3654933fc23 # v2.3
        with:
          dprint-version: '0.54.0' # selfup {"extract":"\\d[^']+","replacer":["dprint", "--version"], "nth": 2}

  typos:
    timeout-minutes: 15
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: crate-ci/typos@v1.45.0 # selfup {"extract":"\\d\\.\\d+\\.\\d+","replacer":["typos", "--version"], "nth": 2}
        with:
          files: |
            .
            .github
            .vscode

  zizmor:
    runs-on: ubuntu-24.04 # Don't use ubuntu-slim until resolving https://github.com/zizmorcore/zizmor-action/issues/74
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3
        with:
          version: '1.24.1' # selfup {"extract":"\\d[^']+","replacer":["zizmor", "--version"], "nth": 2}
          advanced-security: false
